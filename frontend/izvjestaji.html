<!doctype html>
<html lang="bs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>BH Telecom - Izvještaji</title>
    <style>
      body {
        background-color: #1a1a1a;
        color: #e0e0e0;
      }
      
      .card {
        background-color: #2d2d2d;
        border-color: #444;
      }
      
      .form-label {
        color: #e0e0e0;
      }
      
      .form-select {
        background-color: #3a3a3a;
        border-color: #555;
        color: #e0e0e0;
      }
      
      .form-select:focus {
        background-color: #3a3a3a;
        border-color: #FF6600;
        color: #e0e0e0;
      }
      
      .form-select option {
        background-color: #2d2d2d;
      }
      
      h2, h5 {
        color: #ffffff;
      }
      
      .text-muted {
        color: #999 !important;
      }
      
      .btn-orange {
        background-color: #FF6600;
        border-color: #FF6600;
        color: white;
      }
      
      .btn-orange:hover {
        background-color: #E55A00;
        border-color: #E55A00;
        color: white;
      }
      
      .btn-orange:focus,
      .btn-orange:active,
      .btn-orange:active:focus {
        background-color: #E55A00 !important;
        border-color: #E55A00 !important;
        color: white !important;
        box-shadow: 0 0 0 0.25rem rgba(255, 102, 0, 0.5) !important;
      }
      
      .btn-orange:disabled {
        background-color: #CC5500 !important;
        border-color: #CC5500 !important;
        color: #FFE0CC !important;
        opacity: 0.85;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow">
            <div class="card-body">
              <h5 class="card-title text-center mb-4 text-muted">Kompletan Izvještaj</h5>
              <p class="text-center text-muted mb-4">IVR CDR & KPZ Statistika</p>
              
              <form id="select-form">
                <div class="mb-3">
                  <label for="month-select" class="form-label">Mjesec</label>
                  <select name="month" id="month-select" class="form-select"></select>
                </div>
                
                <div class="mb-4">
                  <label for="year-select" class="form-label">Godina</label>
                  <select name="year" id="year-select" class="form-select"></select>
                </div>
                
                <div class="d-grid">
                  <button id="generate-prm" type="submit" class="btn btn-orange btn-lg">
                    Generiši izvještaj
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const monthSelect = document.getElementById("month-select");
        const yearSelect = document.getElementById("year-select");
        const selectForm = document.getElementById("select-form");

        const MJESECI = [
          "Januar",
          "Februar",
          "Mart",
          "April",
          "Maj",
          "Juni",
          "Juli",
          "August",
          "Septembar",
          "Oktobar",
          "Novembar",
          "Decembar",
        ];

        const generisiIzvjestaj = async (godina, mjesec, updateProgress) => {
          const {
            Document,
            Packer,
            Paragraph,
            TextRun,
            Table,
            TableRow,
            TableCell,
            WidthType,
            AlignmentType,
            ShadingType,
            BorderStyle,
            ImageRun,
            VerticalAlign,
          } = docx;

          const border = {
            style: BorderStyle.SINGLE,
            size: 4,
            color: "CCCCCC",
          };
          const borders = {
            top: border,
            bottom: border,
            left: border,
            right: border,
          };

          const makeHeaderCell = (text, width) =>
            new TableCell({
              borders,
              width: { size: width, type: WidthType.DXA },
              shading: { type: ShadingType.CLEAR, fill: "F4A300" },
              margins: { top: 100, bottom: 100, left: 150, right: 150 },
              children: [
                new Paragraph({
                  alignment: AlignmentType.CENTER,
                  children: [
                    new TextRun({
                      text: String(text),
                      bold: true,
                      color: "FFFFFF",
                      size: 22,
                    }),
                  ],
                }),
              ],
            });

          const makeDataCell = (text, sjenka, width) =>
            new TableCell({
              borders,
              width: { size: width, type: WidthType.DXA },
              shading: {
                type: ShadingType.CLEAR,
                fill: sjenka ? "FFF8E1" : "FFFFFF",
              },
              margins: { top: 80, bottom: 80, left: 150, right: 150 },
              children: [
                new Paragraph({
                  alignment: AlignmentType.CENTER,
                  children: [
                    new TextRun({
                      text: String(text),
                      size: 20,
                      color: "333333",
                    }),
                  ],
                }),
              ],
            });

          // Helper to generate chart image (optimized)
          const generateChartImage = (config) => {
            return new Promise((resolve) => {
              const canvas = document.createElement('canvas');
              canvas.width = 800;
              canvas.height = 400;
              const ctx = canvas.getContext('2d');
              new Chart(ctx, config);
              // Reduced timeout from 500ms to 100ms
              setTimeout(() => {
                canvas.toBlob((blob) => {
                  const reader = new FileReader();
                  reader.onloadend = () => resolve(reader.result);
                  reader.readAsArrayBuffer(blob);
                }, 'image/png');
              }, 100);
            });
          };

          // KPZ-specific helper functions
          const makeKpzHeaderCell = (text, width, bgColor = "FFA500") =>
            new TableCell({
              borders: { top: { style: BorderStyle.SINGLE, size: 4, color: "FFFFFF" }, bottom: { style: BorderStyle.SINGLE, size: 4, color: "FFFFFF" }, left: { style: BorderStyle.SINGLE, size: 4, color: "FFFFFF" }, right: { style: BorderStyle.SINGLE, size: 4, color: "FFFFFF" } },
              width: { size: width, type: WidthType.DXA },
              shading: { type: ShadingType.CLEAR, fill: bgColor },
              margins: { top: 80, bottom: 80, left: 80, right: 80 },
              verticalAlign: VerticalAlign.CENTER,
              children: [
                new Paragraph({
                  alignment: AlignmentType.CENTER,
                  children: [
                    new TextRun({ text: String(text), bold: true, color: "000000", size: 16 }),
                  ],
                }),
              ],
            });

          const makeKpzDataCell = (text, width, bgColor = "000000", textColor = "FFFFFF") =>
            new TableCell({
              borders: { top: { style: BorderStyle.SINGLE, size: 4, color: "FFFFFF" }, bottom: { style: BorderStyle.SINGLE, size: 4, color: "FFFFFF" }, left: { style: BorderStyle.SINGLE, size: 4, color: "FFFFFF" }, right: { style: BorderStyle.SINGLE, size: 4, color: "FFFFFF" } },
              width: { size: width, type: WidthType.DXA },
              shading: { type: ShadingType.CLEAR, fill: bgColor },
              margins: { top: 60, bottom: 60, left: 80, right: 80 },
              verticalAlign: VerticalAlign.CENTER,
              children: [
                new Paragraph({
                  alignment: AlignmentType.CENTER,
                  children: [new TextRun({ text: String(text), size: 16, color: textColor })],
                }),
              ],
            });

          const params = new URLSearchParams({ godina, mjesec });

          // Fetch ALL data with single optimized endpoint
          updateProgress && updateProgress("Preuzimanje podataka...");
          const response = await fetch(`http://localhost:5006/api/report/complete?${params}`);
          const reportData = await response.json();
          
          updateProgress && updateProgress("Generisanje grafova...");

          const tvData = reportData.tacnoVrijeme;
          const prmData = reportData.prmBrojevi;
          const televotingData = reportData.televoting;
          const kpzDoprinosData = reportData.kpzDoprinos;
          const prisons = reportData.prisons;

          // Transform KPZ pozivi data to match expected format
          const allKpzPoziviData = prisons.map(p => ({
            brojZatvora: p.brojZatvora,
            name: p.name,
            data: reportData.kpzPozivi[p.brojZatvora] || []
          }));

          // Transform TV data to horizontal format (months as columns)
          const tvMonthLabels = tvData.map(d => `${MJESECI[d.mjesec - 1].substring(0, 3).toLowerCase()}.${d.godina.toString().substring(2)}`);
          const TV_COL = Math.floor(9000 / (tvMonthLabels.length + 1));
          
          const tvRows = [
            new TableRow({
              children: [
                makeKpzHeaderCell("Tačno vrijeme", TV_COL, "FFA500"),
                ...tvMonthLabels.map(label => makeKpzHeaderCell(label, TV_COL, "8B9DC3")),
              ],
            }),
            new TableRow({
              children: [
                makeKpzHeaderCell("Broj uspješnih poziva", TV_COL, "FFA500"),
                ...tvData.map(row => makeKpzDataCell(row.broj_Poziva, TV_COL, "000000", "FFFFFF")),
              ],
            }),
            new TableRow({
              children: [
                makeKpzHeaderCell("Doprinos (cijena po pozivu 0,106)", TV_COL, "FFA500"),
                ...tvData.map(row => makeKpzDataCell((row.broj_Poziva * 0.106).toFixed(2), TV_COL, "000000", "FFFFFF")),
              ],
            }),
          ];

          // Generate TV chart with both broj poziva and doprinos (cijena 0.106)
          updateProgress && updateProgress("Generisanje grafova...");
          const tvChartImage = await generateChartImage({
            type: 'bar',
            data: {
              labels: tvData.map(d => `${MJESECI[d.mjesec - 1].substring(0, 3)}.${d.godina.toString().substring(2)}`),
              datasets: [
                {
                  label: 'Broj uspješnih poziva',
                  data: tvData.map(d => d.broj_Poziva),
                  backgroundColor: 'rgba(54, 162, 235, 0.8)',
                  yAxisID: 'y',
                },
                {
                  label: 'Doprinos (cijena po pozivu 0,106)',
                  data: tvData.map(d => d.broj_Poziva * 0.106),
                  backgroundColor: 'rgba(255, 99, 132, 0.8)',
                  yAxisID: 'y1',
                }
              ]
            },
            options: {
              responsive: false,
              plugins: { 
                legend: { display: true },
                title: { display: true, text: 'Pregled ukupnog broja poziva i doprinosa prema 125' }
              },
              scales: {
                y: {
                  type: 'linear',
                  display: true,
                  position: 'left',
                  title: { display: true, text: 'Broj uspješnih poziva' }
                },
                y1: {
                  type: 'linear',
                  display: true,
                  position: 'right',
                  title: { display: true, text: 'Doprinos (cijena po pozivu 0,106)' },
                  grid: { drawOnChartArea: false }
                }
              }
            }
          });

          const prefixes = ["0800", "0902", "0922", "0942"];
          const prefixNames = {
            "0800": "FPH",
            "0902": "PRM 902",
            "0922": "PRM 922",
            "0942": "PRM 942"
          };
          const grouped = {};
          prmData.forEach((row) => {
            const key = `${row.godina}-${row.mjesec}`;
            if (!grouped[key])
              grouped[key] = {
                godina: row.godina,
                mjesec: row.mjesec,
                values: {},
              };
            grouped[key].values[row.prefix] = row.trajanje;
          });
          const sortedRows = Object.values(grouped).sort(
            (a, b) => a.godina - b.godina || a.mjesec - b.mjesec,
          );

          const PRM_COL = Math.floor(9000 / (prefixes.length + 1));
          const prmColWidths = Array(prefixes.length + 1).fill(PRM_COL);

          const prmRows = [
            new TableRow({
              children: [
                makeKpzHeaderCell("Mjesec", PRM_COL, "8B9DC3"),
                ...prefixes.map((p) => makeKpzHeaderCell(prefixNames[p] || p, PRM_COL, "FFA500")),
              ],
            }),
            ...sortedRows.map(
              (row, i) =>
                new TableRow({
                  children: [
                    makeKpzDataCell(
                      `${MJESECI[row.mjesec - 1].substring(0, 3).toLowerCase()}.${row.godina.toString().substring(2)}`,
                      PRM_COL,
                      i % 2 === 0 ? "8B9DC3" : "5A6B8C"
                    ),
                    ...prefixes.map((p) =>
                      makeKpzDataCell(row.values[p] ?? 0, PRM_COL, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                    ),
                  ],
                }),
            ),
          ];

          // Generate PRM chart
          const prmChartImage = await generateChartImage({
            type: 'bar',
            data: {
              labels: sortedRows.map(d => `${MJESECI[d.mjesec - 1].substring(0, 3)} ${d.godina}`),
              datasets: prefixes.map((prefix, idx) => ({
                label: prefixNames[prefix] || prefix,
                data: sortedRows.map(row => row.values[prefix] || 0),
                backgroundColor: `hsla(${idx * 60}, 70%, 50%, 0.8)`,
              }))
            },
            options: {
              responsive: false,
              plugins: { legend: { display: true } }
            }
          });

          // Process televoting data
          const tvPrefixes = [...new Set(televotingData.map((x) => x.prefix))].sort();
          const tvGrouped = {};
          televotingData.forEach((row) => {
            const key = `${row.godina}-${row.mjesec}`;
            if (!tvGrouped[key])
              tvGrouped[key] = {
                godina: row.godina,
                mjesec: row.mjesec,
                values: {},
              };
            tvGrouped[key].values[row.prefix] = row.broj_Poziva;
          });
          const tvSortedRows = Object.values(tvGrouped).sort(
            (a, b) => a.godina - b.godina || a.mjesec - b.mjesec,
          );

          const TV_VOT_COL = Math.floor(9000 / (tvPrefixes.length + 1));
          const tvVotColWidths = Array(tvPrefixes.length + 1).fill(TV_VOT_COL);

          const televotingRows = [
            new TableRow({
              children: [
                makeKpzHeaderCell("Mjesec", TV_VOT_COL, "8B9DC3"),
                ...tvPrefixes.map((p) => {
                  const tariffMap = {
                    "09622": "T4",
                    "09623": "T5",
                    "09624": "T6",
                    "09625": "T7",
                    "09626": "T8",
                    "09627": "T9"
                  };
                  return makeKpzHeaderCell(`VOT-broj poziva (tarifa ${tariffMap[p] || p})-${p} Fiksna + Mobilna`, TV_VOT_COL, "FFA500");
                }),
              ],
            }),
            ...tvSortedRows.map(
              (row, i) =>
                new TableRow({
                  children: [
                    makeKpzDataCell(
                      `${MJESECI[row.mjesec - 1].substring(0, 3).toLowerCase()}.${row.godina.toString().substring(2)}`,
                      TV_VOT_COL,
                      i % 2 === 0 ? "8B9DC3" : "5A6B8C"
                    ),
                    ...tvPrefixes.map((p) =>
                      makeKpzDataCell(row.values[p] ?? 0, TV_VOT_COL, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                    ),
                  ],
                }),
            ),
          ];

          // Generate televoting chart
          const televotingChartImage = await generateChartImage({
            type: 'bar',
            data: {
              labels: tvSortedRows.map(d => `${MJESECI[d.mjesec - 1].substring(0, 3)} ${d.godina}`),
              datasets: tvPrefixes.map((prefix, idx) => ({
                label: `VOT ${prefix}`,
                data: tvSortedRows.map(row => row.values[prefix] || 0),
                backgroundColor: `hsla(${idx * 60 + 200}, 70%, 50%, 0.8)`,
              }))
            },
            options: {
              responsive: false,
              plugins: { legend: { display: true } }
            }
          });

          // Process KPZ Doprinos data - EXACT COPY from kpz-doprinos.js
          const kpzMonthlyTotals = {};
          kpzDoprinosData.forEach(row => {
            const key = `${row.godina}-${row.mjesec}`;
            if (!kpzMonthlyTotals[key]) {
              kpzMonthlyTotals[key] = { godina: row.godina, mjesec: row.mjesec, total: 0 };
            }
            kpzMonthlyTotals[key].total += row.doprinos;
          });

          const kpzSortedMonths = Object.values(kpzMonthlyTotals).sort(
            (a, b) => a.godina - b.godina || a.mjesec - b.mjesec
          );

          const kpzSummaryRows = [
            new TableRow({
              children: [
                makeKpzHeaderCell("Mjesec", 2500, "8B9DC3"),
                makeKpzHeaderCell("Ukupan doprinos_KM", 2500, "FFA500"),
              ],
            }),
            ...kpzSortedMonths.map((row, i) =>
              new TableRow({
                children: [
                  makeKpzDataCell(`${MJESECI[row.mjesec - 1].substring(0, 3).toLowerCase()}.${row.godina.toString().substring(2)}`, 2500, i % 2 === 0 ? "8B9DC3" : "5A6B8C"),
                  makeKpzDataCell(row.total.toFixed(3).replace('.', ','), 2500, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                ],
              })
            ),
          ];

          const kpzPrisons = [...new Set(kpzDoprinosData.map(d => d.brojZatvora))].sort((a, b) => a - b);
          
          const kpzGrouped = {};
          kpzDoprinosData.forEach(row => {
            const key = `${row.godina}-${row.mjesec}`;
            if (!kpzGrouped[key]) {
              kpzGrouped[key] = { godina: row.godina, mjesec: row.mjesec, prisons: {} };
            }
            kpzGrouped[key].prisons[row.brojZatvora] = row.doprinos;
          });

          const kpzSortedData = Object.values(kpzGrouped).sort(
            (a, b) => a.godina - b.godina || a.mjesec - b.mjesec
          );

          const kpzPrisonNames = {
            1: "KPZ_Zenica", 2: "KPZ_Banovici", 3: "KPZ_Bijeljina", 4: "KPZ_Tuzla_Kozlucani",
            5: "KPZ_Tuzla", 6: "KPZ_Orasje", 8: "KPZ SA Sarajevo", 9: "KPZ SA Sarajevo",
            10: "KPZ SA E (Zenicatrans)", 11: "KPZ Mostar", 12: "KPZ ZE Gorazde"
          };

          const kpzColWidth = 850;
          const kpzDetailRows = [
            new TableRow({
              children: [
                makeKpzHeaderCell("Mjesec", 800, "8B9DC3"),
                ...kpzPrisons.map(p => makeKpzHeaderCell(kpzPrisonNames[p] || `KPZ ${p}`, kpzColWidth, "FFA500")),
                makeKpzHeaderCell("Ukupan doprinos_KM", 1000, "FFA500"),
              ],
            }),
            ...kpzSortedData.map((row, i) =>
              new TableRow({
                children: [
                  makeKpzDataCell(`${MJESECI[row.mjesec - 1].substring(0, 3).toLowerCase()}.${row.godina.toString().substring(2)}`, 800, i % 2 === 0 ? "8B9DC3" : "5A6B8C"),
                  ...kpzPrisons.map(p => makeKpzDataCell((row.prisons[p] || 0).toFixed(2), kpzColWidth, i % 2 === 0 ? "000000" : "333333", "FFFFFF")),
                  makeKpzDataCell(Object.values(row.prisons).reduce((sum, val) => sum + val, 0).toFixed(3).replace('.', ','), 1000, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                ],
              })
            ),
          ];

          // Generate KPZ Doprinos charts
          // Chart 1: Doprinos po zatvorima
          const kpzDoprinosByPrisonChart = await generateChartImage({
            type: 'bar',
            data: {
              labels: kpzSortedData.map(d => `${MJESECI[d.mjesec - 1].substring(0, 3)} ${d.godina}`),
              datasets: kpzPrisons.map((prison, idx) => ({
                label: kpzPrisonNames[prison] || `KPZ ${prison}`,
                data: kpzSortedData.map(row => row.prisons[prison] || 0),
                backgroundColor: `hsla(${idx * 30}, 70%, 50%, 0.8)`,
              }))
            },
            options: {
              responsive: false,
              plugins: { legend: { display: true } }
            }
          });

          // Chart 2: Ukupan doprinos po mjesecima
          const kpzDoprinosTotalChart = await generateChartImage({
            type: 'bar',
            data: {
              labels: kpzSortedMonths.map(d => `${MJESECI[d.mjesec - 1].substring(0, 3)} ${d.godina}`),
              datasets: [{
                label: 'Ukupan doprinos (KM)',
                data: kpzSortedMonths.map(d => d.total),
                backgroundColor: 'rgba(255, 165, 0, 0.8)',
              }]
            },
            options: {
              responsive: false,
              plugins: { legend: { display: true } }
            }
          });

          // Create sections array starting with IVR CDR sections
          const sections = [
              {
                children: [
                  new Paragraph({
                    alignment: AlignmentType.CENTER,
                    children: [
                      new TextRun({
                        text: "IVR CDR Izvještaj",
                        bold: true,
                        size: 36,
                        color: "F4A300",
                      }),
                    ],
                  }),
                  new Paragraph({
                    children: [new TextRun({text: "Statistika Tačno vrijeme - 125",
                      color: "F4A300"
                    })],
                  }),
                  new Table({
                    width: { size: 100, type: WidthType.PERCENTAGE },
                    rows: tvRows,
                  }),
                  new Paragraph({ children: [new TextRun("")] }),
                  new Paragraph({
                    children: [
                      new ImageRun({
                        data: tvChartImage,
                        transformation: { width: 600, height: 300 },
                      }),
                    ],
                  }),
                ],
              },
              {
                children: [
                  new Paragraph({
                    alignment: AlignmentType.CENTER,
                    children: [
                      new TextRun({
                        text: "PRM Brojevi Izvještaj",
                        bold: true,
                        size: 36,
                        color: "F4A300",
                      }),
                    ],
                  }),
                  new Paragraph({
                    alignment: AlignmentType.CENTER,
                  }),
                  new Paragraph({ children: [new TextRun({text: "Trajanje poziva", color: "F4A300"})] }),
                  new Table({
                    width: { size: 9000, type: WidthType.DXA },
                    columnWidths: prmColWidths,
                    rows: prmRows,
                  }),
                  new Paragraph({ children: [new TextRun("")] }),
                  new Paragraph({
                    children: [
                      new ImageRun({
                        data: prmChartImage,
                        transformation: { width: 600, height: 300 },
                      }),
                    ],
                  }),
                ],
              },
              {
                children: [
                  new Paragraph({
                    alignment: AlignmentType.CENTER,
                    children: [
                      new TextRun({
                        text: "Statistika o broju poziva prema Televoting brojevima",
                        bold: true,
                        size: 28,
                        color: "F4A300",
                        underline: {},
                      }),
                    ],
                  }),
                  new Paragraph({ children: [new TextRun("")] }),
                  new Table({
                    width: { size: 9000, type: WidthType.DXA },
                    columnWidths: tvVotColWidths,
                    rows: televotingRows,
                  }),
                  new Paragraph({ children: [new TextRun("")] }),
                  new Paragraph({
                    children: [
                      new ImageRun({
                        data: televotingChartImage,
                        transformation: { width: 600, height: 300 },
                      }),
                    ],
                  }),
                ],
              },
              {
                properties: {
                  page: {
                    margin: { top: 720, right: 720, bottom: 720, left: 720 },
                  },
                },
                children: [
                  new Paragraph({
                    alignment: AlignmentType.LEFT,
                    children: [
                      new TextRun({
                        text: "DOPRINOS_KPZ - Ukupan doprinos",
                        bold: true, size: 28, color: "F4A300",
                      }),
                    ],
                  }),
                  new Paragraph({ children: [new TextRun("")] }),
                  new Table({
                    width: { size: 5000, type: WidthType.DXA },
                    columnWidths: [2500, 2500],
                    rows: kpzSummaryRows,
                  }),
                  new Paragraph({ children: [new TextRun("")] }),
                  new Paragraph({
                    children: [
                      new ImageRun({
                        data: kpzDoprinosTotalChart,
                        transformation: { width: 600, height: 300 },
                      }),
                    ],
                  }),
                ],
              },
              {
                properties: {
                  page: {
                    margin: { top: 720, right: 720, bottom: 720, left: 720 },
                    size: {
                      orientation: "landscape",
                    },
                  },
                },
                children: [
                  new Paragraph({
                    alignment: AlignmentType.LEFT,
                    children: [
                      new TextRun({
                        text: "DOPRINOS_KPZ - Doprinos po KPZ",
                        bold: true, size: 28, color: "F4A300",
                      }),
                    ],
                  }),
                  new Paragraph({ children: [new TextRun("")] }),
                  new Table({
                    width: { size: 100, type: WidthType.PERCENTAGE },
                    columnWidths: [800, ...kpzPrisons.map(() => kpzColWidth), 1000],
                    rows: kpzDetailRows,
                  }),
                  new Paragraph({ children: [new TextRun("")] }),
                  new Paragraph({
                    children: [
                      new ImageRun({
                        data: kpzDoprinosByPrisonChart,
                        transformation: { width: 600, height: 300 },
                      }),
                    ],
                  }),
                ],
              },
            ];

          // Add KPZ Pozivi sections for each prison
          for (const prison of allKpzPoziviData) {
            if (prison.data && prison.data.length > 0) {
              const prisonName = prison.name || `Zatvor ${prison.brojZatvora}`;
              
              // Left table - Basic info
              const leftRows = [
                new TableRow({
                  children: [
                    makeKpzHeaderCell("Datum", 2500, "FFA500"),
                    makeKpzHeaderCell("Ukupan broj poziva", 2500, "FFA500"),
                    makeKpzHeaderCell("Broj javljanja", 2500, "FFA500"),
                  ],
                }),
                ...prison.data.map((row, i) =>
                  new TableRow({
                    children: [
                      makeKpzDataCell(`${MJESECI[row.mjesec - 1].substring(0, 3)}-${row.godina.toString().substring(2)}`, 2500, i % 2 === 0 ? "FFA500" : "CC8400"),
                      makeKpzDataCell(row.brojPoziva, 2500, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                      makeKpzDataCell(row.brojJavljanja, 2500, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                    ],
                  })
                ),
              ];

              // Right table - Duration info
              const rightRows = [
                new TableRow({
                  children: [
                    makeKpzHeaderCell("Datum", 1500, "8B9DC3"),
                    makeKpzHeaderCell("Trajanje razgovora (min)", 1500, "FFA500"),
                    makeKpzHeaderCell("Trajanje prema fiksnoj (min)", 1500, "FFA500"),
                    makeKpzHeaderCell("Trajanje prema mobilnoj (min)", 1500, "FFA500"),
                    makeKpzHeaderCell("Trajanje prema ino (min)", 1500, "FFA500"),
                  ],
                }),
                ...prison.data.map((row, i) =>
                  new TableRow({
                    children: [
                      makeKpzDataCell(`${MJESECI[row.mjesec - 1].substring(0, 3)}-${row.godina.toString().substring(2)}`, 1500, i % 2 === 0 ? "8B9DC3" : "5A6B8C"),
                      makeKpzDataCell(row.trajanjeRazgovora, 1500, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                      makeKpzDataCell(row.trajanjePremaFiksnoj, 1500, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                      makeKpzDataCell(row.trajanjePremaMobilnoj, 1500, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                      makeKpzDataCell(row.trajanjePremaInternacionalnoj, 1500, i % 2 === 0 ? "000000" : "333333", "FFFFFF"),
                    ],
                  })
                ),
              ];

              // Generate Chart 1: Broj poziva + Broj javljanja
              const prisonCallsChart = await generateChartImage({
                type: 'bar',
                data: {
                  labels: prison.data.map(d => `${MJESECI[d.mjesec - 1].substring(0, 3)} ${d.godina}`),
                  datasets: [
                    {
                      label: 'Broj poziva',
                      data: prison.data.map(d => d.brojPoziva),
                      backgroundColor: 'rgba(255, 165, 0, 0.8)',
                    },
                    {
                      label: 'Broj javljanja',
                      data: prison.data.map(d => d.brojJavljanja),
                      backgroundColor: 'rgba(139, 157, 195, 0.8)',
                    }
                  ]
                },
                options: {
                  responsive: false,
                  plugins: { legend: { display: true } }
                }
              });

              // Generate Chart 2: All durations
              const prisonDurationsChart = await generateChartImage({
                type: 'bar',
                data: {
                  labels: prison.data.map(d => `${MJESECI[d.mjesec - 1].substring(0, 3)} ${d.godina}`),
                  datasets: [
                    {
                      label: 'Trajanje razgovora (min)',
                      data: prison.data.map(d => d.trajanjeRazgovora),
                      backgroundColor: 'rgba(255, 99, 132, 0.8)',
                    },
                    {
                      label: 'Trajanje prema fiksnoj (min)',
                      data: prison.data.map(d => d.trajanjePremaFiksnoj),
                      backgroundColor: 'rgba(54, 162, 235, 0.8)',
                    },
                    {
                      label: 'Trajanje prema mobilnoj (min)',
                      data: prison.data.map(d => d.trajanjePremaMobilnoj),
                      backgroundColor: 'rgba(75, 192, 192, 0.8)',
                    },
                    {
                      label: 'Trajanje prema ino (min)',
                      data: prison.data.map(d => d.trajanjePremaInternacionalnoj),
                      backgroundColor: 'rgba(153, 102, 255, 0.8)',
                    }
                  ]
                },
                options: {
                  responsive: false,
                  plugins: { legend: { display: true } }
                }
              });

              // Create wrapper table to hold both tables side by side
              const wrapperTable = new Table({
                width: { size: 9000, type: WidthType.DXA },
                borders: {
                  top: { style: BorderStyle.NONE, size: 0 },
                  bottom: { style: BorderStyle.NONE, size: 0 },
                  left: { style: BorderStyle.NONE, size: 0 },
                  right: { style: BorderStyle.NONE, size: 0 },
                  insideHorizontal: { style: BorderStyle.NONE, size: 0 },
                  insideVertical: { style: BorderStyle.NONE, size: 0 },
                },
                rows: [
                  new TableRow({
                    children: [
                      new TableCell({
                        width: { size: 4400, type: WidthType.DXA },
                        borders: {
                          top: { style: BorderStyle.NONE, size: 0 },
                          bottom: { style: BorderStyle.NONE, size: 0 },
                          left: { style: BorderStyle.NONE, size: 0 },
                          right: { style: BorderStyle.NONE, size: 0 },
                        },
                        margins: { top: 0, bottom: 0, left: 0, right: 100 },
                        verticalAlign: VerticalAlign.TOP,
                        children: [
                          new Table({
                            width: { size: 4300, type: WidthType.DXA },
                            columnWidths: [1400, 1400, 1500],
                            rows: leftRows,
                          }),
                        ],
                      }),
                      new TableCell({
                        width: { size: 4600, type: WidthType.DXA },
                        borders: {
                          top: { style: BorderStyle.NONE, size: 0 },
                          bottom: { style: BorderStyle.NONE, size: 0 },
                          left: { style: BorderStyle.NONE, size: 0 },
                          right: { style: BorderStyle.NONE, size: 0 },
                        },
                        margins: { top: 0, bottom: 0, left: 100, right: 0 },
                        verticalAlign: VerticalAlign.TOP,
                        children: [
                          new Table({
                            width: { size: 4500, type: WidthType.DXA },
                            columnWidths: [900, 900, 900, 900, 900],
                            rows: rightRows,
                          }),
                        ],
                      }),
                    ],
                  }),
                ],
              });

              sections.push({
                properties: {
                  page: {
                    margin: { top: 720, right: 720, bottom: 720, left: 720 },
                  },
                },
                children: [
                  new Paragraph({
                    alignment: AlignmentType.LEFT,
                    children: [
                      new TextRun({
                        text: "KPZ",
                        bold: true,
                        size: 28,
                        color: "F4A300",
                      }),
                    ],
                  }),
                  new Paragraph({
                    alignment: AlignmentType.LEFT,
                    children: [
                      new TextRun({
                        text: prisonName,
                        size: 24,
                        color: "F4A300",
                      }),
                    ],
                  }),
                  new Paragraph({
                    alignment: AlignmentType.LEFT,
                    children: [
                      new TextRun({
                        text: `Statistika o pozivima iz ${prisonName} po mjesecima`,
                        italic: true,
                        size: 16,
                        color: "F4A300",
                      }),
                    ],
                  }),
                  new Paragraph({ children: [new TextRun("")] }),
                  wrapperTable,
                  new Paragraph({ children: [new TextRun("")] }),
                  new Paragraph({
                    alignment: AlignmentType.CENTER,
                    children: [
                      new ImageRun({
                        data: prisonCallsChart,
                        transformation: { width: 400, height: 200 },
                      }),
                      new TextRun("    "),
                      new ImageRun({
                        data: prisonDurationsChart,
                        transformation: { width: 400, height: 200 },
                      }),
                    ],
                  }),
                ],
              });
            }
          }

          updateProgress && updateProgress("Kreiranje dokumenta...");
          const doc = new Document({ sections });

          const blob = await Packer.toBlob(doc);
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `ivr-cdr-${godina}-${String(mjesec).padStart(2, "0")}.docx`;
          a.click();
          URL.revokeObjectURL(url);
        };

        const loadSelectMonth = () => {
          const trenutniMjesec = new Date().getMonth();
          monthSelect.innerHTML = MJESECI.map(
            (mj, i) =>
              `<option value="${i + 1}" ${i === trenutniMjesec ? "selected" : ""}>${mj}</option>`,
          ).join("");
        };

        const loadSelectYear = () => {
          const godina = new Date().getFullYear();
          const niz = Array.from({ length: 10 }, (_, i) => godina - i);
          yearSelect.innerHTML = niz
            .map(
              (g) =>
                `<option value="${g}" ${g === godina ? "selected" : ""}>${g}</option>`,
            )
            .join("");
        };

        let isGenerating = false;
        const generateButton = document.getElementById("generate-prm");

        const updateProgress = (message) => {
          generateButton.textContent = message;
        };

        selectForm.addEventListener("submit", async (event) => {
          event.preventDefault();
          
          // Prevent multiple clicks
          if (isGenerating) return;
          
          isGenerating = true;
          generateButton.disabled = true;
          
          try {
            const godina = parseInt(yearSelect.value);
            const mjesec = parseInt(monthSelect.value);
            
            updateProgress("Učitavanje podataka...");
            await generisiIzvjestaj(godina, mjesec, updateProgress);
            updateProgress("Preuzimanje...");
          } finally {
            setTimeout(() => {
              isGenerating = false;
              generateButton.disabled = false;
              generateButton.textContent = "Generiši izvještaj";
            }, 500);
          }
        });

        loadSelectMonth();
        loadSelectYear();
      });
    </script>
  </body>
</html>
